name: ClaudeWatch
options:
  # Neutral placeholder — fork users set their own reverse-DNS prefix + Team.
  bundleIdPrefix: com.example.agentwatch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ONLY_ACTIVE_ARCH: true
    # ONE knob for the whole app's identity. The iPhone id, the Watch id
    # (<id>.watchkitapp), and the Watch's WKCompanionAppBundleIdentifier all
    # derive from this — change it in one place (or run scripts/configure-ios.sh).
    AGENT_WATCH_BUNDLE_ID: com.example.agentwatch

targets:
  ClaudeWatch:
    type: application
    platform: iOS
    sources:
      - path: "ClaudeWatch iOS"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(AGENT_WATCH_BUNDLE_ID)
        INFOPLIST_FILE: "ClaudeWatch iOS/Info.plist"
        PRODUCT_NAME: Agent Watch
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: ClaudeWatchWatch
        embed: true

  ClaudeWatchWatch:
    type: application
    platform: watchOS
    sources:
      - path: "ClaudeWatch watchOS"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(AGENT_WATCH_BUNDLE_ID).watchkitapp
        INFOPLIST_FILE: "ClaudeWatch watchOS/Info.plist"
        # Distinct from the iOS app's "Agent Watch" — two targets producing the
        # same .app name caused "Multiple commands produce …/Agent Watch.app".
        PRODUCT_NAME: Agent Watch Watch App
        GENERATE_INFOPLIST_FILE: false
        SUPPORTS_MACCATALYST: false
        ARCHS: "arm64 arm64e arm64_32"
        "EXCLUDED_ARCHS[sdk=watchsimulator*]": arm64e

schemes:
  ClaudeWatch:
    build:
      targets:
        ClaudeWatch: all
        ClaudeWatchWatch: all
    run:
      config: Debug
  ClaudeWatchWatch:
    build:
      targets:
        ClaudeWatchWatch: all
    run:
      config: Debug
      executable: ClaudeWatchWatch
