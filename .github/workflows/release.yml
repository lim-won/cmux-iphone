name: release

# On a published GitHub Release (tag like v0.1.0):
#   1. build the self-contained, vendored bridge tarball
#   2. attach it to the release
#   3. bump url + sha256 in the Homebrew tap (OWNER/homebrew-tap)
#
# Prereqs (one-time, in repo Settings → Secrets and variables → Actions):
#   COMMITTER_TOKEN — a classic PAT with `repo` + `workflow` scope that can push
#                     to your homebrew-tap repo. See packaging/homebrew/README.md.

on:
  release:
    types: [published]

permissions:
  contents: write   # upload the release asset

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build vendored tarball
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          echo "V=$V" >> "$GITHUB_ENV"
          stage="dist/agent-watch"
          mkdir -p "$stage/bridge"
          # Self-contained package: the bridge + the scripts agent-watch shells out to.
          cp -R skill/bridge/. "$stage/bridge/"
          cp skill/setup.sh skill/setup-hooks.sh "$stage/"
          # Reproducible, prod-only deps (pure JS → safe to vendor, no compile).
          ( cd "$stage/bridge" && rm -rf node_modules && npm ci --omit=dev )
          find dist -name '.DS_Store' -delete
          tar -C dist -czf "agent-watch-${V}.tar.gz" agent-watch
          echo "sha256:"; shasum -a 256 "agent-watch-${V}.tar.gz"

      - name: Attach tarball to the release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-watch-*.tar.gz

      - name: Bump Homebrew formula in the tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: agent-watch
          homebrew-tap: ${{ github.repository_owner }}/homebrew-tap
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/agent-watch-${{ env.V }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
